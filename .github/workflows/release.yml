name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FileSystemics.slnx

      - name: Build
        run: dotnet build FileSystemics.slnx --no-restore -c Release

      - name: Test
        run: dotnet test --solution FileSystemics.slnx --no-build -c Release

      - name: Pack
        run: |
          dotnet pack src/FileSystemics.SpanIO/FileSystemics.SpanIO.csproj -c Release --no-build -o nupkg
          dotnet pack src/FileSystemics.SpanIO.Platform/FileSystemics.SpanIO.Platform.csproj -c Release --no-build -o nupkg

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push packages
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push symbols
        run: |
          dotnet nuget push nupkg/*.snupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
